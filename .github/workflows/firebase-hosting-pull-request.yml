name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Pin the Node that firebase-tools runs under. Node 24.17.0 introduced
          # a keep-alive http.Agent regression (nodejs/node#63989) that makes
          # node-fetch throw ERR_STREAM_PREMATURE_CLOSE against Google APIs,
          # breaking the hosting deploy (auth + release calls). 24.16.0 is the
          # last good version.
          node-version: '24.16.0'
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEEKLY_EXPENSE }}
          projectId: weekly-expense
