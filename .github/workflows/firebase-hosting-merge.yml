# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
#
# Hardened deploy: FirebaseExtended/action-hosting-deploy@v0 (firebase-tools)
# intermittently reports a false failure on the live release — the HTTP/2 call
# to Firebase hits a "premature close", firebase-tools retries the release
# non-idempotently, and the retry returns 400 FAILED_PRECONDITION ("is the
# current active version") even though the FIRST attempt already published.
# So we let the deploy step continue on error, then VERIFY against the live
# site that this exact build is actually serving — that is the real success
# signal. The job fails only if production is genuinely not updated.
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - id: deploy
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEEKLY_EXPENSE }}
          channelId: live
          projectId: weekly-expense
      - name: Verify production serves this build
        run: |
          set -euo pipefail
          URL="https://weekly-expense.web.app"
          # The exact content-hashed bundle this build produced. The live index
          # references it only once this build is the active release.
          BUNDLE="$(grep -oE '/assets/app-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)"
          # A string that lives in our app bundle but never in index.html, so a
          # SPA-rewrite fallback (which returns index.html with HTTP 200) can't
          # masquerade as a successful asset fetch.
          MARKER="expense-126234090787.asia-southeast1.run.app"
          echo "Expecting live site to serve bundle: $BUNDLE (marker: $MARKER)"
          for i in $(seq 1 12); do
            BODY="$(curl -fsS "$URL$BUNDLE?cb=$RANDOM-$i" || true)"
            if printf '%s' "$BODY" | grep -q "$MARKER"; then
              echo "✓ Production is serving this build with the correct backend URL."
              exit 0
            fi
            echo "attempt $i/12: not live yet; waiting for release + CDN…"
            sleep 15
          done
          echo "✗ Production did not serve this build after retries — deploy genuinely failed."
          echo "  Deploy step outcome was: ${{ steps.deploy.outcome }}"
          exit 1
